<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Erro</title>
<style>
	body {
		font-family: Arial, sans-serif;
		background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		display: flex;
		justify-content: center;
		align-items: center;
		height: 100vh;
		margin: 0;
		padding: 20px;
	}
	
	.error-container {
		background-color: white;
		border-radius: 8px;
		box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
		padding: 40px;
		max-width: 500px;
		text-align: center;
	}
	
	.error-code {
		font-size: 72px;
		font-weight: bold;
		color: #d32f2f;
		margin-bottom: 10px;
	}
	
	.error-title {
		font-size: 24px;
		color: #333;
		margin-bottom: 15px;
	}
	
	.error-message {
		font-size: 16px;
		color: #666;
		margin-bottom: 30px;
		line-height: 1.6;
	}
	
	.error-details {
		background-color: #f5f5f5;
		border-left: 4px solid #d32f2f;
		padding: 15px;
		margin-bottom: 30px;
		text-align: left;
		border-radius: 4px;
		font-size: 14px;
		color: #666;
		max-height: 150px;
		overflow-y: auto;
	}
	
	.button-group {
		display: flex;
		gap: 10px;
		justify-content: center;
		flex-wrap: wrap;
	}
	
	.btn {
		padding: 12px 30px;
		border: none;
		border-radius: 4px;
		font-size: 16px;
		font-weight: bold;
		cursor: pointer;
		text-decoration: none;
		display: inline-flex;
		align-items: center;
		justify-content: center;
		transition: all 0.3s ease;
	}
	
	.btn-primary {
		background-color: #4CAF50;
		color: white;
	}
	
	.btn-primary:hover {
		background-color: #45a049;
		transform: translateY(-2px);
		box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
	}
	
	.btn-secondary {
		background-color: #2196F3;
		color: white;
	}
	
	.btn-secondary:hover {
		background-color: #0b7dda;
		transform: translateY(-2px);
		box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
	}
	
	.icon {
		font-size: 48px;
		margin-bottom: 15px;
	}
</style>
</head>
<body>
	<div class="error-container">
		<div class="icon">⚠️</div>
		
		<div class="error-code" th:text="${status}">500</div>
		
		<div class="error-title" th:text="${error}">Erro Interno do Servidor</div>
		
		<div class="error-message" th:text="${message}">
			Ocorreu um erro ao processar sua solicitação. Por favor, tente novamente mais tarde.
		</div>
		
		<div class="error-details" th:if="${exception}">
			<strong>Detalhes do erro:</strong><br>
			<span th:text="${exception}"></span>
		</div>
		
		<div class="button-group">
			<a href="/home" class="btn btn-primary">← Voltar à Home</a>
			<a href="javascript:history.back()" class="btn btn-secondary">Voltar</a>
		</div>
	</div>
</body>
</html>
